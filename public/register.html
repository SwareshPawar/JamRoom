<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JamRoom</title>
    <script src="/js/shared/theme.js"></script>
    
    <link rel="stylesheet" href="/css/shared.css">
    <script src="/js/shared/navigation.js"></script>
    <link rel="stylesheet" href="/css/pages/register.css">

</head>
<body>
    <div id="navigationContainer"></div>

    <div class="register-container">
        <div class="register-header">
            <h1>🎸 JamRoom Register</h1>
            <p>Create an account to start booking</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number (Optional)</label>
                <input type="tel" id="mobile" name="mobile" placeholder="+91XXXXXXXXXX or 10 digits" pattern="^(\+91[-\s]?)?[6-9]\d{9}$" title="Please enter a valid Indian mobile number">
                <div class="password-hint">Indian mobile number (optional)</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
                <div class="password-hint">Minimum 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
            </div>

            <button type="submit" class="btn" id="submitBtn">Register</button>
        </form>

        <div class="links">
            <a href="/login.html">Already have an account? Login</a>
        </div>

        <div class="back-home">
            <a href="/">&larr; Back to Home</a>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const form = document.getElementById('registerForm');
        const alertDiv = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');

        if (window.NavigationManager) {
            window.NavigationManager.init(null);
            window.NavigationManager.render('navigationContainer');
        }

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!name || !email || !password || !confirmPassword) {
                showAlert('Please fill in all required fields');
                return;
            }

            // Validate mobile if provided
            if (mobile && mobile.trim() !== '') {
                const mobilePattern = /^(\+91[-\s]?)?[6-9]\d{9}$/;
                if (!mobilePattern.test(mobile.trim())) {
                    showAlert('Please enter a valid Indian mobile number');
                    return;
                }
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            try {
                const requestBody = { name, email, password };
                if (mobile && mobile.trim() !== '') {
                    requestBody.mobile = mobile.trim();
                }

                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (data.success) {
                    // Store token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showAlert('Registration successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/booking.html';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Registration failed');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('An error occurred. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/booking.html';
        }
    </script>
</body>
</html>
