<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Swar Jamroom Studio</title>
    <meta name="theme-color" content="#38bdf8">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/jamroom-192.png">
    <script src="/js/shared/theme.js"></script>
    
    <link rel="stylesheet" href="/css/shared.css">
    <script src="/js/shared/navigation.js"></script>
    <link rel="stylesheet" href="/css/pages/login.css">

</head>
<body>
    <div id="navigationContainer"></div>

    <div class="login-container">
        <div class="login-header">
            <h1>🎸 JamRoom Login</h1>
            <p>Sign in to book your jam session</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <button type="submit" class="btn" id="submitBtn">Login</button>
        </form>

        <div class="links">
            <a href="/register.html">Don't have an account? Register</a>
            <span>|</span>
            <a href="/reset-password.html">Forgot Password?</a>
        </div>

        <div class="back-home">
            <a href="/">&larr; Back to Home</a>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const form = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');

        if (window.NavigationManager) {
            window.NavigationManager.init(null);
            window.NavigationManager.render('navigationContainer');
        }

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Please fill in all fields');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.requiresPasswordReset && data.resetToken) {
                    showAlert('Password reset required. Redirecting to secure reset...', 'success');
                    setTimeout(() => {
                        window.location.href = `/reset-password.html?token=${encodeURIComponent(data.resetToken)}&force=1`;
                    }, 1200);
                    return;
                }

                if (data.success) {
                    // Store token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        // Redirect based on role
                        if (data.user.role === 'admin') {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/booking.html';
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || 'Login failed');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('An error occurred. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/booking.html';
        }
    </script>
    <script src="/js/shared/pwa-install.js"></script>
</body>
