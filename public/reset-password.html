<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - JamRoom</title>
    
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/pages/reset-password.css">

</head>
<body>
    <div class="reset-container">
        <h1>🔐 Reset Password</h1>
        <div id="alert" class="alert"></div>

        <div id="requestForm">
            <p class="form-hint">
                Enter your email to receive a password reset link
            </p>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn" id="forgotBtn">Send Reset Link</button>
            </form>
        </div>

        <div id="resetForm" class="is-hidden">
            <p class="form-hint">
                Enter your new password
            </p>
            <form id="newPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                <button type="submit" class="btn" id="resetBtn">Reset Password</button>
            </form>
        </div>

        <div class="links">
            <a href="/login.html">Back to Login</a>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const alertDiv = document.getElementById('alert');
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
        }

        if (resetToken) {
            document.getElementById('requestForm').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
        }

        // Forgot password
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('forgotBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_URL}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Reset link sent to your email!', 'success');
                } else {
                    showAlert(data.message || 'Failed to send reset link');
                }
            } catch (error) {
                showAlert('An error occurred');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });

        // Reset password
        document.getElementById('newPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch(`${API_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Password reset successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    showAlert(data.message || 'Failed to reset password');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (error) {
                showAlert('An error occurred');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
