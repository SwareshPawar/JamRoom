<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>JamRoom Mobile Booking</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JamRoom">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/jamroom-icon.svg">
    <link rel="stylesheet" href="/css/booking-mobile.css">
</head>
<body>
    <div class="mobile-app-shell">
        <header class="app-header">
            <div class="brand-wrap">
                <div class="brand-badge">JR</div>
                <div>
                    <h1>JamRoom</h1>
                    <p>Mobile Booking</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="installBtn" class="chip-btn">Install</button>
                <button id="desktopBtn" class="chip-btn chip-muted">Desktop</button>
            </div>
        </header>

        <div class="status-strip" id="statusStrip">Preparing mobile booking...</div>

        <main class="frame-wrap">
            <iframe
                id="bookingFrame"
                title="JamRoom Booking"
                src="/booking.html?mobile=1&embedded=1"
                loading="eager"
                referrerpolicy="same-origin"
            ></iframe>
        </main>

        <nav class="bottom-dock">
            <button class="dock-btn active" data-target="bookingSection">New</button>
            <button class="dock-btn" data-target="referenceTimeline">Slots</button>
            <button class="dock-btn" data-target="myBookingsSection">My Bookings</button>
        </nav>
    </div>

    <div id="iosInstallHint" class="ios-install-hint hidden">
        <strong>Add to Home Screen:</strong> Tap Share, then <em>Add to Home Screen</em> on iPhone.
    </div>

    <script>
        (() => {
            const bookingFrame = document.getElementById('bookingFrame');
            const statusStrip = document.getElementById('statusStrip');
            const installBtn = document.getElementById('installBtn');
            const desktopBtn = document.getElementById('desktopBtn');
            const dockButtons = Array.from(document.querySelectorAll('.dock-btn'));
            const iosInstallHint = document.getElementById('iosInstallHint');

            let deferredPrompt = null;

            const isPhoneLike = () => {
                return /Android|iPhone|iPad|iPod|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent)
                    || window.matchMedia('(max-width: 900px)').matches;
            };

            const isStandalone = () => {
                return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            };

            const shouldShowIosHint = () => {
                const ua = navigator.userAgent || '';
                const isIOS = /iPhone|iPad|iPod/i.test(ua);
                return isIOS && !isStandalone();
            };

            if (!isPhoneLike() && !new URL(window.location.href).searchParams.get('forceMobile')) {
                window.location.replace('/booking.html?desktop=1');
                return;
            }

            if (shouldShowIosHint()) {
                iosInstallHint.classList.remove('hidden');
            }

            desktopBtn.addEventListener('click', () => {
                localStorage.setItem('jamroom_force_desktop', '1');
                window.location.href = '/booking.html?desktop=1';
            });

            window.addEventListener('beforeinstallprompt', (event) => {
                event.preventDefault();
                deferredPrompt = event;
                installBtn.disabled = false;
                installBtn.textContent = 'Install';
            });

            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) {
                    if (shouldShowIosHint()) {
                        iosInstallHint.classList.remove('hidden');
                        return;
                    }
                    statusStrip.textContent = 'Install prompt unavailable right now. Open in Chrome/Safari and try again.';
                    return;
                }

                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.textContent = 'Installed';
                installBtn.disabled = true;
            });

            const focusFrameSection = (targetId) => {
                try {
                    const frameWindow = bookingFrame.contentWindow;
                    const frameDocument = frameWindow?.document;
                    if (!frameDocument) return;

                    const target = frameDocument.getElementById(targetId);
                    if (!target) return;

                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });

                    const section = target.closest('.section');
                    if (section && section.classList.contains('collapsed')) {
                        section.classList.remove('collapsed');
                        const icon = section.querySelector('.collapse-icon');
                        if (icon) icon.textContent = '−';
                    }
                } catch (error) {
                    console.error('Unable to navigate frame section:', error);
                }
            };

            dockButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    dockButtons.forEach((item) => item.classList.remove('active'));
                    button.classList.add('active');
                    focusFrameSection(button.dataset.target);
                });
            });

            bookingFrame.addEventListener('load', () => {
                try {
                    const framePath = bookingFrame.contentWindow?.location?.pathname || '';
                    if (framePath === '/login.html') {
                        statusStrip.textContent = 'Please login to continue booking.';
                    } else {
                        statusStrip.textContent = 'Ready. Fast mobile booking mode is active.';
                    }
                } catch (error) {
                    statusStrip.textContent = 'Ready. Fast mobile booking mode is active.';
                }
            });

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', async () => {
                    try {
                        await navigator.serviceWorker.register('/sw-booking.js');
                    } catch (error) {
                        console.error('Service worker registration failed:', error);
                    }
                });
            }
        })();
    </script>
</body>
</html>
