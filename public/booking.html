<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Jam Session - Swar Jamroom Studio</title>
    <meta name="theme-color" content="#38bdf8">
    <script src="/js/shared/theme.js"></script>

    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/jamroom-192.png">
    
    <!-- Shared CSS -->
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <!-- Shared JavaScript Modules -->
    <script src="/js/shared/utils.js"></script>
    <script src="/js/shared/alerts.js"></script>
    <script src="/js/shared/auth.js"></script>
    <script src="/js/shared/payment.js"></script>
    <script src="/js/shared/navigation.js"></script>
    
    <!-- Booking-specific styles -->
    
    <link rel="stylesheet" href="/css/pages/booking.css">

</head>
<body class="booking-preload">
    <div class="app-container">
        <!-- Navigation will be rendered here by NavigationManager -->
        <div id="navigationContainer"></div>

        <div class="main-content">
            <!-- Booking Form -->
            <div class="section" id="bookingSection">
                <div class="section-header">
                    <h2>Book</h2>
                </div>
                <div class="section-content">
                <!-- Note: Alert now handled by shared AlertManager -->

                <form id="bookingForm">
                    <div class="form-group booking-row">
                        <label for="bookingTypeSelect">Catalog*</label>
                        <div class="booking-type-combobox" id="bookingTypeCombobox">
                            <input id="bookingTypeSelect" placeholder="Select catalog" autocomplete="off" required aria-autocomplete="list" aria-expanded="false" aria-controls="bookingTypeDropdown">
                            <button type="button" id="bookingTypeToggle" class="booking-type-toggle" aria-label="Show catalog options" title="Show catalog options">
                                <span aria-hidden="true">▾</span>
                            </button>
                            <div id="bookingTypeDropdown" class="booking-type-dropdown" hidden></div>
                        </div>
                    </div>

                    <div class="form-group booking-hidden-initial booking-row" id="classLocationGroup">
                        <label for="classLocation">Location*</label>
                        <select id="classLocation">
                            <option value="">Select location</option>
                        </select>
                        <small class="field-help">Class location.</small>
                    </div>

                    <div class="form-group booking-hidden-initial booking-row" id="classPlanMonthsGroup">
                        <label for="classPlanMonths">Plan*</label>
                        <select id="classPlanMonths">
                            <option value="1">1 Month</option>
                        </select>
                        <small class="field-help" id="classDiscountHint">Longer plans save more.</small>
                    </div>

                    <div class="form-group booking-hidden-initial" id="classPlanInfoGroup">
                        <div class="field-help" id="classPlanInfoText">4 classes/month. Schedule is auto-generated.</div>
                    </div>

                    <div class="form-group booking-hidden-initial booking-row" id="classPreferredWeekdayGroup">
                        <label for="classPreferredWeekday">Weekday*</label>
                        <select id="classPreferredWeekday">
                            <option value="">Select day</option>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                        <small class="field-help">Default weekly day.</small>
                    </div>

                    <div id="hourlyBookingBlock" class="booking-flow-block">
                    <div class="form-group booking-row" id="hourlyDateGroup">
                        <label for="bookingDate">Date*</label>
                        <input type="date" id="bookingDate" required>
                    </div>

                    <!-- Reference View - Schedule for selected date -->
                    <div class="reference-view" id="hourlyAvailabilityView" aria-live="polite">
                        <div class="reference-view-head">
                            <h3 class="reference-view-title">Availability</h3>
                        </div>

                        <div class="reference-view-body">
                            <div id="referenceTimeline" class="timeline">
                                <div class="booking-theme-status booking-theme-status-muted">Pick date to view.</div>
                            </div>
                        </div>
                    </div>

                    <div class="time-container" id="hourlyTimeContainer">
                        <div class="form-group booking-row">
                            <label for="startTime" id="startTimeLabel">Time*</label>
                            <div class="time-custom-select" id="startTimeCustom">
                                <button type="button" class="time-custom-trigger" id="startTimeTrigger" disabled aria-haspopup="listbox" aria-expanded="false">
                                    <span id="startTimeDisplay">Pick date first</span>
                                    <span class="time-custom-caret" aria-hidden="true"></span>
                                </button>
                                <select id="startTime" required disabled aria-hidden="true" tabindex="-1">
                                    <option value="">Pick date first</option>
                                </select>
                            </div>
                            <div id="startTimeLoading" class="loading-text start-time-loading">Loading...</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Hourly Items*</label>
                        <div id="rentalsList" class="rentals-container">
                            <!-- Rental items will be populated here -->
                        </div>
                    </div>
                    </div>

                    <div id="perdayBookingBlock" class="booking-flow-block booking-hidden-initial">
                        <div class="perday-compact-fields">
                        <div class="form-group booking-inline-field">
                            <label for="perdayStartDate">Pickup*</label>
                            <input type="date" id="perdayStartDate" disabled>
                        </div>
                        <div class="form-group booking-inline-field">
                            <label for="perdayPickupTime">Pick Time*</label>
                            <select id="perdayPickupTime" size="5" disabled>
                                <option value="" selected>Select time</option>
                                <option value="08:00">8:00 AM</option>
                                <option value="09:00">9:00 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="12:00">12:00 PM</option>
                                <option value="13:00">1:00 PM</option>
                                <option value="14:00">2:00 PM</option>
                                <option value="15:00">3:00 PM</option>
                                <option value="16:00">4:00 PM</option>
                                <option value="17:00">5:00 PM</option>
                                <option value="18:00">6:00 PM</option>
                                <option value="19:00">7:00 PM</option>
                                <option value="20:00">8:00 PM</option>
                                <option value="21:00">9:00 PM</option>
                                <option value="22:00">10:00 PM</option>
                                <option value="23:00">11:00 PM</option>
                            </select>
                        </div>
                        <div class="form-group booking-inline-field">
                            <label for="perdayEndDate">Return*</label>
                            <input type="date" id="perdayEndDate" disabled>
                        </div>
                        <div class="form-group booking-inline-field">
                            <label for="perdayReturnTime">Return Time*</label>
                            <input type="time" id="perdayReturnTime" disabled>
                            <small id="perdayDaysInfo" class="field-help">Return time matches pickup time.</small>
                        </div>

                        </div>

                        <!-- Per-day availability reference panel (shown after dates are picked) -->
                        <div class="reference-view" id="perdayReferenceView" aria-live="polite">
                            <div class="reference-view-head">
                                <h3 class="reference-view-title">Availability</h3>
                            </div>
                            <div class="reference-view-body">
                                <div id="perdayAvailabilityTimeline" class="timeline">
                                        <div class="booking-theme-status booking-theme-status-muted">Pick time to view.</div>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                                <label>Per-Day Items*</label>
                            <div id="perdayRentalsList" class="rentals-container">
                                <!-- Per-day rental items will be populated here -->
                            </div>
                        </div>
                    </div>

                    <div id="priceDisplay" class="price-display booking-hidden-initial">
                        <div class="price-breakdown">
                            <div id="selectedRentals" class="selected-rentals"></div>
                            <hr class="price-break-divider">
                            <div class="price-total">
                                <div class="subtotal">
                                    <span>Subtotal:</span>
                                    <span id="subtotalAmount">₹0</span>
                                </div>
                                <div class="tax booking-hidden-initial" id="taxSection">
                                    <span id="taxLabel">GST (18%):</span>
                                    <span id="taxAmount">₹0</span>
                                </div>
                                <div class="total">
                                    <span><strong>Total:</strong></span>
                                    <span id="totalPrice"><strong>₹0</strong></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary booking-submit-btn">Book</button>
                </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        (() => {
            const PRELOAD_CLASS = 'booking-preload';
            let isRevealed = false;

            const revealBookingPage = () => {
                if (isRevealed || !document.body) return;
                isRevealed = true;
                document.body.classList.remove(PRELOAD_CLASS);
            };

            document.addEventListener('jamroom:navigation-rendered', revealBookingPage, { once: true });
            window.addEventListener('load', revealBookingPage, { once: true });
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(revealBookingPage, 1200);
            }, { once: true });
        })();
    </script>

    <!-- Loading overlay - fallback for non-JamRoomUtils contexts -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loader"></div>
            <div id="loadingMessage">Loading...</div>
        </div>
    </div>

        <script src="/js/booking/booking-auth.js"></script>
        <script src="/js/booking/booking-availability.js"></script>
        <script src="/js/booking/booking-pricing.js"></script>
        <script src="/js/booking/booking-rentals.js"></script>
        <script src="/js/booking/booking-api.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/js/booking/booking-payment.js"></script>
        <script src="/js/booking/booking-form.js"></script>
        <script src="/js/booking/booking-main.js"></script>
    <script src="/js/shared/pwa-install.js"></script>
</body>
</html>
